<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini World Multiplayer</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#74c0fc;
}

#ui {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  background:rgba(0,0,0,0.35);
  padding:10px;
  border-radius:10px;
  color:white;
}

input, button {
  margin:3px;
  padding:5px;
}
</style>
</head>
<body>

<div id="ui">
<h3>Mini World</h3>

<input id="room" placeholder="Room Code">
<input id="name" placeholder="Name">

<button onclick="joinRoom()">Join / Create</button>
<button onclick="switchMap()">Map</button>
<button onclick="switchGame()">Game</button>

<p id="status">Offline</p>
</div>

<script>

// 🌐 WORLD STATE
let room = "";
let name = "";
let gameMode = "balloon";
let map = 0;

let world = JSON.parse(localStorage.getItem("WORLD_DATA") || "{}");

// 🧑 JOIN OR CREATE ROOM
function joinRoom() {
  room = document.getElementById("room").value;
  name = document.getElementById("name").value;

  if (!room || !name) return;

  if (!world[room]) world[room] = {players:{}};

  world[room].players[name] = {
    score:0,
    y:300
  };

  save();

  document.getElementById("status").innerText =
    `Room: ${room} | Player: ${name}`;
}

// 🗺️ MAP SWITCH
function switchMap() {
  map = (map + 1) % 3;
}

// 🎮 SWITCH GAME
function switchGame() {
  gameMode = gameMode === "balloon" ? "catch" : "balloon";
}

// 💾 SAVE WORLD
function save() {
  localStorage.setItem("WORLD_DATA", JSON.stringify(world));
}

// 🎮 GAME
class Scene extends Phaser.Scene {

  preload() {
    this.load.image("balloon","https://labs.phaser.io/assets/sprites/red_balloon.png");

    this.load.image("bg0","https://labs.phaser.io/assets/skies/sky4.png");
    this.load.image("bg1","https://labs.phaser.io/assets/skies/sky2.png");
    this.load.image("bg2","https://labs.phaser.io/assets/skies/sky1.png");

    this.load.audio("pop","https://actions.google.com/sounds/v1/cartoon/pop.ogg");
  }

  create() {

    this.bg = this.add.image(640,360,"bg0").setScale(1.5);

    this.player = this.add.image(640,300,"balloon").setScale(0.2);

    this.vel = 2;

    this.pop = this.sound.add("pop");

    this.scoreText = this.add.text(20,20,"Score: 0",{fontSize:"24px",color:"#fff"});
    this.lbText = this.add.text(850,50,"",{fontSize:"18px",color:"#fff"});

    this.input.on("pointerdown", () => {

      if (!room || !name) return;

      this.vel = -5;
      this.pop.play();

      world[room].players[name].score++;
      save();
    });
  }

  update() {

    // 🎮 GAMEPLAY
    if (gameMode === "balloon") {
      this.player.y += this.vel;
      this.vel += 0.15;

      if (this.player.y > 650) {
        this.player.y = 300;
        this.vel = 2;
      }
    }

    // 🗺️ MAPS
    this.bg.setTexture("bg" + map);

    this.render();
  }

  render() {

    if (!world[room]) return;

    let list = Object.entries(world[room].players)
      .sort((a,b)=>b[1].score-a[1].score)
      .slice(0,5);

    let text = "Leaderboard\n";

    list.forEach(p=>{
      text += `${p[0]}: ${p[1].score}\n`;
    });

    this.lbText.setText(text);
    this.scoreText.setText(`Game: ${gameMode}`);
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width:1280,
  height:720,
  scene:Scene,
  scale:{
    mode:Phaser.Scale.FIT,
    autoCenter:Phaser.Scale.CENTER_BOTH
  }
});

</script>

</body>
</html>
