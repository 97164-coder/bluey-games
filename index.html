<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Room Party</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#74c0fc;
  font-family:Arial;
}

#ui {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  color:white;
}

input, button {
  padding:6px;
  margin:2px;
}
</style>
</head>
<body>

<div id="ui">
Room: <input id="room">
Name: <input id="name">
<button onclick="startGame()">Join</button>
<button onclick="switchMap()">Switch Map</button>
</div>

<script>

// 🧠 LOCAL ROOM SYSTEM
let room = "";
let name = "";
let score = 0;
let map = "house";

let roomData = JSON.parse(localStorage.getItem("rooms") || "{}");

// 🎮 JOIN GAME
function startGame() {
  room = document.getElementById("room").value;
  name = document.getElementById("name").value;

  if (!room || !name) return;

  if (!roomData[room]) roomData[room] = {};

  roomData[room][name] = {score:0,y:300};

  localStorage.setItem("rooms", JSON.stringify(roomData));

  document.getElementById("ui").style.display = "none";
}

// 🗺️ SWITCH MAP
function switchMap() {
  map = map === "house" ? "park" : "house";
}

// 🎮 GAME SCENE
class MainScene extends Phaser.Scene {

  preload() {
    this.load.image("balloon", "https://i.imgur.com/4AIbQJX.png");
    this.load.image("house", "https://i.imgur.com/1Q9Z1Zp.png");
    this.load.image("park", "https://i.imgur.com/8Q2YQ0m.png");

    this.load.audio("pop", "https://actions.google.com/sounds/v1/cartoon/pop.ogg");
  }

  create() {

    this.bg = this.add.image(640,360,"house").setScale(1.5);

    this.balloon = this.add.image(640,300,"balloon").setScale(0.2);

    this.velocity = 2;

    this.pop = this.sound.add("pop");

    this.scoreText = this.add.text(20,20,"Score: 0",{fontSize:"26px",color:"#fff"});

    this.lbText = this.add.text(900,50,"Leaderboard",{fontSize:"20px",color:"#fff"});

    this.input.on("pointerdown", () => {
      this.velocity = -5;
      score++;
      this.pop.play();
      this.save();
    });
  }

  update() {

    this.balloon.y += this.velocity;
    this.velocity += 0.15;

    if (this.balloon.y > 650) {
      this.balloon.y = 300;
      this.velocity = 2;
      score = 0;
    }

    this.scoreText.setText("Score: " + score);

    // 🗺️ MAP CHANGE
    this.bg.setTexture(map === "house" ? "house" : "park");

    this.loadRoom();
  }

  save() {
    let data = JSON.parse(localStorage.getItem("rooms") || "{}");

    if (!data[room]) data[room] = {};
    data[room][name] = {score:score,y:this.balloon.y};

    localStorage.setItem("rooms", JSON.stringify(data));
  }

  loadRoom() {

    let data = JSON.parse(localStorage.getItem("rooms") || "{}");
    let players = data[room] || {};

    let text = "Leaderboard\n";

    let sorted = Object.entries(players)
      .sort((a,b)=>b[1].score-a[1].score)
      .slice(0,5);

    sorted.forEach(p=>{
      text += p[0] + ": " + p[1].score + "\n";
    });

    this.lbText.setText(text);
  }
}

// ⚙️ GAME CONFIG
new Phaser.Game({
  type: Phaser.AUTO,
  width:1280,
  height:720,
  scene:MainScene,
  scale:{
    mode:Phaser.Scale.FIT,
    autoCenter:Phaser.Scale.CENTER_BOTH
  }
});

</script>

</body>
</html>
