<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini World Rooms</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #74c0fc;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 10px;
  color: white;
}

input, button {
  margin: 3px;
  padding: 6px;
}
</style>
</head>
<body>

<div id="ui">
<h3>Mini World</h3>

<input id="room" placeholder="Room Code">
<input id="name" placeholder="Name">

<button onclick="join()">Join/Create</button>
<button onclick="switchMap()">Switch Map</button>

<p id="status">Not joined</p>
</div>

<script>

// 🌐 WORLD DATA (LOCAL ONLY)
let room = "";
let name = "";
let score = 0;
let mapIndex = 0;

let world = JSON.parse(localStorage.getItem("WORLD") || "{}");

// 🧑 JOIN ROOM
function join() {
  room = document.getElementById("room").value;
  name = document.getElementById("name").value;

  if (!room || !name) return;

  if (!world[room]) world[room] = {players:{}};

  world[room].players[name] = {score:0,y:300};

  save();

  document.getElementById("status").innerText =
    "Room: " + room + " | Player: " + name;
}

// 🗺️ SWITCH MAP
function switchMap() {
  mapIndex = (mapIndex + 1) % 3;
}

// 💾 SAVE WORLD
function save() {
  localStorage.setItem("WORLD", JSON.stringify(world));
}

// 🎮 GAME
class GameScene extends Phaser.Scene {

  preload() {
    // ✅ 100% WORKING ASSETS (NO BROKEN LINKS)
    this.load.image("balloon", "https://labs.phaser.io/assets/sprites/red_balloon.png");

    this.load.image("bg0", "https://labs.phaser.io/assets/skies/sky4.png");
    this.load.image("bg1", "https://labs.phaser.io/assets/skies/sky2.png");
    this.load.image("bg2", "https://labs.phaser.io/assets/skies/sky1.png");

    this.load.audio("pop", "https://actions.google.com/sounds/v1/cartoon/pop.ogg");
  }

  create() {

    this.bg = this.add.image(640,360,"bg0").setScale(1.5);

    this.player = this.add.image(640,300,"balloon").setScale(0.2);

    this.vel = 2;

    this.pop = this.sound.add("pop");

    this.scoreText = this.add.text(20,20,"Score: 0",{fontSize:"24px",color:"#fff"});
    this.lbText = this.add.text(850,50,"Leaderboard",{fontSize:"18px",color:"#fff"});

    this.input.on("pointerdown", () => {

      if (!room || !name) return;

      this.vel = -5;
      score++;
      this.pop.play();

      world[room].players[name].score = score;

      save();
    });
  }

  update() {

    // 🎮 PHYSICS
    this.player.y += this.vel;
    this.vel += 0.15;

    if (this.player.y > 650) {
      this.player.y = 300;
      this.vel = 2;
      score = 0;
    }

    this.scoreText.setText("Score: " + score);

    // 🗺️ MAP SWITCH
    this.bg.setTexture("bg" + mapIndex);

    this.renderLeaderboard();
  }

  renderLeaderboard() {

    if (!world[room]) return;

    let list = Object.entries(world[room].players)
      .sort((a,b)=>b[1].score-a[1].score)
      .slice(0,5);

    let text = "Leaderboard\n";

    list.forEach(p=>{
      text += p[0] + ": " + p[1].score + "\n";
    });

    this.lbText.setText(text);
  }
}

// ⚙️ GAME CONFIG
new Phaser.Game({
  type: Phaser.AUTO,
  width: 1280,
  height: 720,
  scene: GameScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  }
});

</script>

</body>
</html>
